<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paused Banner</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "SF Pro Display", sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
      overflow:hidden;
    }

    .bg-glow{
      position:absolute;
      width:350px;
      height:350px;
      background:rgba(255,255,255,0.06);
      filter:blur(120px);
      border-radius:50%;
    }

    .banner{
      position:relative;
      width:420px;
      padding:28px;
      border-radius:30px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(25px);
      -webkit-backdrop-filter:blur(25px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 8px 32px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
      color:white;
      text-align:center;
    }

    .pause-icon{
      width:70px;
      height:70px;
      margin:auto;
      border-radius:22px;
      background:rgba(255,255,255,0.08);
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .bars{
      display:flex;
      gap:10px;
    }

    .bars span{
      width:10px;
      height:34px;
      border-radius:20px;
      background:white;
      opacity:0.9;
    }

    h1{
      font-size:28px;
      font-weight:600;
      letter-spacing:-0.5px;
      margin-bottom:10px;
    }

    p{
      font-size:15px;
      color:rgba(255,255,255,0.65);
      line-height:1.5;
    }

    .status{
      margin-top:24px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.06);
      font-size:14px;
      color:rgba(255,255,255,0.9);
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:white;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{ opacity:0.3; transform:scale(0.8);}
      50%{ opacity:1; transform:scale(1);}
      100%{ opacity:0.3; transform:scale(0.8);}
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="banner">
    
    <div class="pause-icon">
      <div class="bars">
        <span></span>
        <span></span>
      </div>
    </div>

    <h1>Paused for Some Time</h1>

    <p>
      We’re currently taking a short pause.<br>
      Everything will be back soon.
    </p>

    <div class="status">
      <div class="dot"></div>
      Temporary Pause
    </div>

  </div>

</body>
</html>
